name: CI/CD Shared Hosting

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: laravel_testing
      DB_USERNAME: laravel
      DB_PASSWORD: laravel

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: laravel_testing
          MYSQL_USER: laravel
          MYSQL_PASSWORD: laravel
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run automated tests
        run: php artisan test

  deploy:
    name: Deploy production
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production

    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL || 'ftp' }}
      FTP_SERVER_DIR: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
      DEPLOY_URL: ${{ vars.DEPLOY_URL }}
      DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment secrets
        shell: bash
        run: |
          missing=0
          for name in FTP_SERVER FTP_USERNAME FTP_PASSWORD DEPLOY_URL DEPLOY_HOOK_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error::$name belum dikonfigurasi pada GitHub Environment production."
              missing=1
            fi
          done

          if [ -n "$DEPLOY_URL" ] && [[ "$DEPLOY_URL" != https://* ]]; then
            echo "::error::DEPLOY_URL wajib menggunakan HTTPS."
            missing=1
          fi

          exit "$missing"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo_mysql, tokenizer, xml
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install production PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Build production frontend
        run: |
          npm ci
          npm run build

      - name: Prepare release directory
        shell: bash
        run: |
          mkdir -p release
          mkdir -p release/_app

          rsync -a ./ release/_app/ \
            --exclude-from=.deployignore \
            --exclude="public/"

          rsync -a public/ release/

          sed -i "s#__DIR__.'/../storage#__DIR__.'/_app/storage#g" release/index.php
          sed -i "s#__DIR__.'/../vendor#__DIR__.'/_app/vendor#g" release/index.php
          sed -i "s#__DIR__.'/../bootstrap#__DIR__.'/_app/bootstrap#g" release/index.php

          cat > release/_app/.htaccess <<'HTACCESS'
          Options -Indexes

          <IfModule mod_authz_core.c>
              Require all denied
          </IfModule>

          <IfModule !mod_authz_core.c>
              Deny from all
          </IfModule>
          HTACCESS

          rm -f release/_app/bootstrap/cache/config.php
          rm -f release/_app/bootstrap/cache/events.php
          rm -f release/_app/bootstrap/cache/routes-*.php
          rm -f release/_app/bootstrap/cache/routes-v7.php
          find release/_app/storage -type d -exec chmod 775 {} \;
          find release/_app/bootstrap/cache -type d -exec chmod 775 {} \;

      - name: Create production ZIP package
        shell: bash
        run: |
          cd release
          zip -q -r ../radina-production.zip .

      - name: Upload production ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: radina-production-${{ github.sha }}
          path: radina-production.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Install FTP client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Resolve last production commit
        id: production
        shell: bash
        run: |
          if [ "$FTP_PROTOCOL" = "ftp" ]; then
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow false
          set ftp:ssl-force false"
          elif [ "$FTP_PROTOCOL" = "ftps" ]; then
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true"
          else
            echo "::error::FTP_PROTOCOL harus bernilai ftp atau ftps."
            exit 1
          fi

          rm -f /tmp/radina-deploy-commit

          lftp <<LFTP || true
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 15
          $FTP_TLS_SETTINGS
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER"
          cd "$FTP_SERVER_DIR"
          get .radina-deploy-commit -o /tmp/radina-deploy-commit
          bye
          LFTP

          base_sha=""

          if [ -s /tmp/radina-deploy-commit ]; then
            candidate="$(tr -d '\r\n' < /tmp/radina-deploy-commit)"
            if git cat-file -e "$candidate^{commit}" 2>/dev/null; then
              base_sha="$candidate"
            fi
          fi

          if [ -z "$base_sha" ] && [ "${{ github.event_name }}" = "push" ]; then
            candidate="${{ github.event.before }}"
            if [ "$candidate" != "0000000000000000000000000000000000000000" ] \
              && git cat-file -e "$candidate^{commit}" 2>/dev/null; then
              base_sha="$candidate"
            fi
          fi

          if [ -z "$base_sha" ]; then
            base_sha="$(git rev-parse HEAD^)"
            echo "::warning::Marker production belum tersedia. Perubahan dihitung dari commit sebelumnya."
          fi

          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "Membandingkan production $base_sha dengan $GITHUB_SHA"

      - name: Prepare incremental release
        id: incremental
        shell: bash
        env:
          BASE_SHA: ${{ steps.production.outputs.base_sha }}
        run: |
          mkdir -p incremental-release

          frontend_changed=false
          composer_changed=false

          while IFS=$'\t' read -r status first_path second_path; do
            path="$first_path"

            if [[ "$status" == R* ]]; then
              path="$second_path"
            fi

            if [ -z "$path" ] || [ ! -e "$path" ]; then
              continue
            fi

            case "$path" in
              .github/*|docs/*|tests/*|README*|.gitignore|.gitattributes|.editorconfig|.deployignore)
                continue
                ;;
              resources/js/*|resources/css/*|package.json|package-lock.json|vite.config.*|tailwind.config.*|postcss.config.*)
                frontend_changed=true
                ;;
              composer.json|composer.lock)
                composer_changed=true
                ;;
            esac

            if [[ "$path" == public/* ]]; then
              target="${path#public/}"
              mkdir -p "incremental-release/$(dirname "$target")"
              cp -a "release/$target" "incremental-release/$target"
            elif [ -e "release/_app/$path" ]; then
              mkdir -p "incremental-release/_app/$(dirname "$path")"
              cp -a "release/_app/$path" "incremental-release/_app/$path"
            fi
          done < <(git diff --name-status --find-renames "$BASE_SHA" "$GITHUB_SHA")

          if [ "$frontend_changed" = true ]; then
            rm -rf incremental-release/build incremental-release/_app/bootstrap/ssr
            cp -a release/build incremental-release/build
            mkdir -p incremental-release/_app/bootstrap
            cp -a release/_app/bootstrap/ssr incremental-release/_app/bootstrap/ssr
          fi

          rm -rf incremental-release/_app/app incremental-release/_app/routes
          mkdir -p incremental-release/_app
          cp -a release/_app/app incremental-release/_app/app
          cp -a release/_app/routes incremental-release/_app/routes

          mkdir -p incremental-release/_app/database/import
          cp -a release/_app/database/import/portal_berita.sql \
            incremental-release/_app/database/import/portal_berita.sql

          mkdir -p incremental-release/_app/bootstrap/cache
          cp -a release/_app/bootstrap/cache/packages.php \
            incremental-release/_app/bootstrap/cache/packages.php
          cp -a release/_app/bootstrap/cache/services.php \
            incremental-release/_app/bootstrap/cache/services.php

          printf '%s\n' "$GITHUB_SHA" > incremental-release/.radina-release-commit

          python <<'PY'
          import hashlib
          import json
          from pathlib import Path

          root = Path('incremental-release')
          files = {}

          for path in sorted(root.rglob('*')):
              if not path.is_file() or path.name == '.radina-release-manifest.json':
                  continue

              relative = path.relative_to(root).as_posix()
              content = path.read_bytes()
              files[relative] = {
                  'bytes': len(content),
                  'sha256': hashlib.sha256(content).hexdigest(),
              }

          manifest = {
              'commit': '${{ github.sha }}',
              'files': files,
          }

          (root / '.radina-release-manifest.json').write_text(
              json.dumps(manifest, separators=(',', ':'), sort_keys=True),
              encoding='utf-8',
          )
          PY

          file_count="$(find incremental-release -type f | wc -l | tr -d ' ')"
          echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
          echo "File incremental yang akan diunggah: $file_count"
          find incremental-release -type f -print

          if [ "$composer_changed" = true ]; then
            echo "::warning::composer.lock berubah. Upload dan extract artifact ZIP terbaru agar folder vendor ikut diperbarui."
          fi

      - name: Upload changed files using FTP
        shell: bash
        run: |
          printf '%s\n' "$GITHUB_SHA" > /tmp/radina-current-commit

          if [ "$FTP_PROTOCOL" = "ftp" ]; then
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow false
          set ftp:ssl-force false"
          else
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true"
          fi

          lftp <<LFTP
          set cmd:fail-exit yes
          set net:max-retries 3
          set net:timeout 20
          $FTP_TLS_SETTINGS
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER"
          mirror --reverse --verbose --parallel=2 \
            incremental-release/ "$FTP_SERVER_DIR"
          bye
          LFTP

      - name: Run production migrations over HTTPS
        shell: bash
        run: |
          timestamp="$(date +%s)"
          seed_sql_sha256="$(sha256sum database/import/portal_berita.sql | awk '{print $1}')"
          release_manifest_sha256="$(sha256sum incremental-release/.radina-release-manifest.json | awk '{print $1}')"
          signature="$(printf '%s\n%s\n%s\n%s' "$timestamp" "$GITHUB_SHA" "$seed_sql_sha256" "$release_manifest_sha256" | openssl dgst -sha256 -hmac "$DEPLOY_HOOK_SECRET" -hex | awk '{print $2}')"

          response_file="$(mktemp)"
          status_code="$(curl --show-error --silent \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            --header "Accept: application/json" \
            --header "X-Deploy-Timestamp: $timestamp" \
            --header "X-Deploy-Commit: $GITHUB_SHA" \
            --header "X-Seed-Sql-Sha256: $seed_sql_sha256" \
            --header "X-Release-Manifest-Sha256: $release_manifest_sha256" \
            --header "X-Deploy-Signature: $signature" \
            "${DEPLOY_URL%/}/deploy-hook.php")"

          cat "$response_file"
          echo

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "::error::Deployment hook gagal dengan HTTP $status_code."
            exit 1
          fi

      - name: Mark successful production commit
        shell: bash
        run: |
          if [ "$FTP_PROTOCOL" = "ftp" ]; then
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow false
          set ftp:ssl-force false"
          else
            FTP_TLS_SETTINGS="
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true"
          fi

          lftp <<LFTP
          set cmd:fail-exit yes
          set net:max-retries 3
          set net:timeout 20
          $FTP_TLS_SETTINGS
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER"
          cd "$FTP_SERVER_DIR"
          put /tmp/radina-current-commit -o .radina-deploy-commit
          bye
          LFTP
